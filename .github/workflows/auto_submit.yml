# .github/workflows/auto_submit.yml
name: 🔁 Auto URL Submit Every Hour

on:
  schedule:
    - cron: '0 * * * *'  # IST: 6:30AM, 9:30AM, 12:30PM...
  workflow_dispatch:  # Allow manual trigger

# Permissions for pushing commits back to repo
permissions:
  contents: write
  actions: read

jobs:
  auto-submit:
    runs-on: ubuntu-latest
    timeout-minutes: 25  # Slightly increased for safety
    
    env:
      TZ: Asia/Kolkata  # Set timezone for logs
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'  # Cache pip dependencies for faster runs

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Verify Chromium & Chromedriver
        run: |
          echo "🔍 Checking Chromium installation..."
          which chromium || which chromium-browser || echo "⚠️ Chromium not found in PATH"
          chromium --version || chromium-browser --version || true
          
          echo "🔍 Checking Chromedriver..."
          which chromedriver
          chromedriver --version
          
          # Set environment variable for Selenium to find Chromium
          if [ -f "/usr/bin/chromium" ]; then
            echo "CHROME_BIN=/usr/bin/chromium" >> $GITHUB_ENV
          elif [ -f "/usr/bin/chromium-browser" ]; then
            echo "CHROME_BIN=/usr/bin/chromium-browser" >> $GITHUB_ENV
          fi

      - name: 🤖 Run Auto Submit Script
        env:
          PANEL_USER: ${{ secrets.PANEL_USER }}
          PANEL_PASS: ${{ secrets.PANEL_PASS }}
        run: python auto_submit.py
        continue-on-error: false  # Fail workflow if script fails

      - name: 💾 Commit progress to repository
        if: always()  # Run even if script fails, to save logs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add files if they exist
          [ -f "automation.log" ] && git add automation.log
          [ -f "login_error.png" ] && git add login_error.png
          
          # Only commit if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "🤖 Auto-update: $(date '+%Y-%m-%d %H:%M IST')"
            git push
            echo "✅ Changes committed"
          else
            echo "✅ No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload logs as artifact (for download)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-logs-${{ github.run_number }}
          path: |
            automation.log
            login_error.png
          retention-days: 7
          if-no-files-found: ignore
